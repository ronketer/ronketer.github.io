<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <rect width="800" height="450" fill="#1e2538"/>

  <defs>
    <pattern id="grid-mr" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#38bdf8" stroke-width="0.15" opacity="0.25"/>
    </pattern>
    <marker id="arr-mr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#38bdf8" opacity="0.75"/>
    </marker>
  </defs>
  <rect width="800" height="450" fill="url(#grid-mr)"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="monospace" font-size="13" fill="#38bdf8" opacity="0.7" letter-spacing="2">MAPREDUCE FRAMEWORK — MAP / SHUFFLE / REDUCE</text>

  <!-- Phase column dividers -->
  <line x1="265" y1="52" x2="265" y2="390" stroke="#38bdf8" stroke-width="0.8" opacity="0.2" stroke-dasharray="5,5"/>
  <line x1="535" y1="52" x2="535" y2="390" stroke="#38bdf8" stroke-width="0.8" opacity="0.2" stroke-dasharray="5,5"/>

  <!-- Phase column headers -->
  <text x="145" y="66" text-anchor="middle" font-family="monospace" font-size="12" fill="#38bdf8" opacity="0.85" letter-spacing="1">MAP</text>
  <text x="400" y="66" text-anchor="middle" font-family="monospace" font-size="12" fill="#38bdf8" opacity="0.85" letter-spacing="1">SHUFFLE</text>
  <text x="660" y="66" text-anchor="middle" font-family="monospace" font-size="12" fill="#38bdf8" opacity="0.85" letter-spacing="1">REDUCE</text>

  <!-- MAP: 4 input item boxes -->
  <rect x="60" y="100" width="115" height="32" rx="5" fill="#161b27" stroke="#38bdf8" stroke-width="1.5" opacity="0.9"/>
  <text x="117" y="121" text-anchor="middle" font-family="monospace" font-size="11" fill="#38bdf8">input[0]</text>

  <rect x="60" y="157" width="115" height="32" rx="5" fill="#161b27" stroke="#38bdf8" stroke-width="1.5" opacity="0.9"/>
  <text x="117" y="178" text-anchor="middle" font-family="monospace" font-size="11" fill="#38bdf8">input[1]</text>

  <rect x="60" y="214" width="115" height="32" rx="5" fill="#161b27" stroke="#38bdf8" stroke-width="1.5" opacity="0.9"/>
  <text x="117" y="235" text-anchor="middle" font-family="monospace" font-size="11" fill="#38bdf8">input[2]</text>

  <rect x="60" y="271" width="115" height="32" rx="5" fill="#161b27" stroke="#38bdf8" stroke-width="1.5" opacity="0.9"/>
  <text x="117" y="292" text-anchor="middle" font-family="monospace" font-size="11" fill="#38bdf8">input[3]</text>

  <!-- atomic counter badge under MAP items -->
  <rect x="60" y="325" width="130" height="22" rx="4" fill="#0ea5e9" fill-opacity="0.08" stroke="#38bdf8" stroke-width="0.8" opacity="0.75"/>
  <text x="125" y="340" text-anchor="middle" font-family="monospace" font-size="9" fill="#38bdf8" opacity="0.8">atomic&lt;uint64_t&gt;</text>

  <!-- Arrows MAP → SHUFFLE -->
  <line x1="175" y1="116" x2="285" y2="143" stroke="#38bdf8" stroke-width="1.2" marker-end="url(#arr-mr)" opacity="0.65"/>
  <line x1="175" y1="173" x2="285" y2="205" stroke="#38bdf8" stroke-width="1.2" marker-end="url(#arr-mr)" opacity="0.65"/>
  <line x1="175" y1="230" x2="285" y2="248" stroke="#38bdf8" stroke-width="1.2" marker-end="url(#arr-mr)" opacity="0.65"/>
  <line x1="175" y1="287" x2="285" y2="302" stroke="#38bdf8" stroke-width="1.2" marker-end="url(#arr-mr)" opacity="0.65"/>

  <!-- SHUFFLE: 3 key groups -->
  <!-- K1 -->
  <rect x="285" y="112" width="130" height="52" rx="5" fill="#161b27" stroke="#38bdf8" stroke-width="1" opacity="0.75"/>
  <text x="298" y="129" font-family="monospace" font-size="10" fill="#38bdf8" opacity="0.6">K1</text>
  <rect x="312" y="133" width="18" height="18" rx="3" fill="#38bdf8" opacity="0.45"/>
  <rect x="336" y="133" width="18" height="18" rx="3" fill="#38bdf8" opacity="0.45"/>
  <rect x="360" y="133" width="18" height="18" rx="3" fill="#38bdf8" opacity="0.45"/>

  <!-- K2 -->
  <rect x="285" y="184" width="130" height="52" rx="5" fill="#161b27" stroke="#38bdf8" stroke-width="1" opacity="0.75"/>
  <text x="298" y="201" font-family="monospace" font-size="10" fill="#38bdf8" opacity="0.6">K2</text>
  <rect x="312" y="205" width="18" height="18" rx="3" fill="#38bdf8" opacity="0.55"/>
  <rect x="336" y="205" width="18" height="18" rx="3" fill="#38bdf8" opacity="0.55"/>

  <!-- K3 -->
  <rect x="285" y="256" width="130" height="72" rx="5" fill="#161b27" stroke="#38bdf8" stroke-width="1" opacity="0.75"/>
  <text x="298" y="273" font-family="monospace" font-size="10" fill="#38bdf8" opacity="0.6">K3</text>
  <rect x="312" y="277" width="18" height="18" rx="3" fill="#38bdf8" opacity="0.35"/>
  <rect x="336" y="277" width="18" height="18" rx="3" fill="#38bdf8" opacity="0.35"/>
  <rect x="360" y="277" width="18" height="18" rx="3" fill="#38bdf8" opacity="0.35"/>
  <rect x="312" y="301" width="18" height="18" rx="3" fill="#38bdf8" opacity="0.35"/>

  <!-- barrier sync labels at dividers -->
  <text x="540" y="176" font-family="monospace" font-size="9" fill="#38bdf8" opacity="0.45">barrier</text>
  <text x="540" y="188" font-family="monospace" font-size="9" fill="#38bdf8" opacity="0.45">sync</text>

  <!-- Arrows SHUFFLE → REDUCE -->
  <line x1="415" y1="138" x2="553" y2="152" stroke="#38bdf8" stroke-width="1.2" marker-end="url(#arr-mr)" opacity="0.65"/>
  <line x1="415" y1="210" x2="553" y2="218" stroke="#38bdf8" stroke-width="1.2" marker-end="url(#arr-mr)" opacity="0.65"/>
  <line x1="415" y1="285" x2="553" y2="285" stroke="#38bdf8" stroke-width="1.2" marker-end="url(#arr-mr)" opacity="0.65"/>

  <!-- REDUCE: 3 output boxes -->
  <rect x="556" y="122" width="115" height="50" rx="5" fill="#161b27" stroke="#38bdf8" stroke-width="1.5" opacity="0.9"/>
  <text x="613" y="152" text-anchor="middle" font-family="monospace" font-size="11" fill="#38bdf8">out[K1]</text>

  <rect x="556" y="193" width="115" height="50" rx="5" fill="#161b27" stroke="#38bdf8" stroke-width="1.5" opacity="0.9"/>
  <text x="613" y="223" text-anchor="middle" font-family="monospace" font-size="11" fill="#38bdf8">out[K2]</text>

  <rect x="556" y="260" width="115" height="50" rx="5" fill="#161b27" stroke="#38bdf8" stroke-width="1.5" opacity="0.9"/>
  <text x="613" y="290" text-anchor="middle" font-family="monospace" font-size="11" fill="#38bdf8">out[K3]</text>

  <!-- Stats bar -->
  <rect x="100" y="408" width="600" height="28" rx="4" fill="#161b27" opacity="0.6"/>
  <text x="400" y="426" text-anchor="middle" font-family="monospace" font-size="11" fill="#38bdf8" opacity="0.7">C++17 · pthreads · std::atomic work-stealing · pthread_barrier</text>
</svg>
