<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <rect width="800" height="450" fill="#1e2538"/>

  <defs>
    <pattern id="grid2" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#38bdf8" stroke-width="0.15" opacity="0.25"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#grid2)"/>

  <text x="400" y="38" text-anchor="middle" font-family="monospace" font-size="13" fill="#38bdf8" opacity="0.7" letter-spacing="2">STEREO VISUAL SLAM — 3D TRAJECTORY (KITTI)</text>

  <!-- 3D trajectory path — simulated curve representing ego-motion -->
  <polyline
    points="120,360 145,340 175,318 210,298 248,282 288,270 330,263 372,262 414,266 454,274 492,285 528,298 562,314 592,330 618,347 638,364 655,378 668,388 678,394"
    fill="none" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- Feature points / keyframes along trajectory -->
  <circle cx="145" cy="340" r="4" fill="#38bdf8" opacity="0.8"/>
  <circle cx="210" cy="298" r="4" fill="#38bdf8" opacity="0.8"/>
  <circle cx="288" cy="270" r="4" fill="#38bdf8" opacity="0.8"/>
  <circle cx="372" cy="262" r="5" fill="#38bdf8" opacity="1"/>
  <circle cx="454" cy="274" r="4" fill="#38bdf8" opacity="0.8"/>
  <circle cx="528" cy="298" r="4" fill="#38bdf8" opacity="0.8"/>
  <circle cx="592" cy="330" r="4" fill="#38bdf8" opacity="0.8"/>
  <circle cx="638" cy="364" r="4" fill="#38bdf8" opacity="0.8"/>

  <!-- Sparse 3D feature cloud (map points) -->
  <g opacity="0.35" fill="#38bdf8">
    <circle cx="160" cy="280" r="2"/><circle cx="180" cy="250" r="1.5"/>
    <circle cx="220" cy="230" r="2"/><circle cx="250" cy="210" r="1.5"/>
    <circle cx="300" cy="200" r="2"/><circle cx="340" cy="195" r="1.5"/>
    <circle cx="380" cy="192" r="2"/><circle cx="420" cy="197" r="1.5"/>
    <circle cx="460" cy="210" r="2"/><circle cx="500" cy="222" r="1.5"/>
    <circle cx="540" cy="240" r="2"/><circle cx="580" cy="260" r="1.5"/>
    <circle cx="615" cy="280" r="2"/><circle cx="645" cy="300" r="1.5"/>
    <circle cx="190" cy="310" r="1.5"/><circle cx="270" cy="250" r="2"/>
    <circle cx="350" cy="230" r="1.5"/><circle cx="430" cy="235" r="2"/>
    <circle cx="510" cy="260" r="1.5"/><circle cx="570" cy="290" r="2"/>
    <circle cx="170" cy="330" r="1.5"/><circle cx="440" cy="256" r="1.5"/>
    <circle cx="260" cy="290" r="1.5"/><circle cx="320" cy="220" r="2"/>
    <circle cx="490" cy="240" r="1.5"/><circle cx="600" cy="310" r="1.5"/>
  </g>

  <!-- Axis labels -->
  <line x1="80" y1="390" x2="80" y2="160" stroke="#38bdf8" stroke-width="1" opacity="0.3"/>
  <line x1="80" y1="390" x2="720" y2="390" stroke="#38bdf8" stroke-width="1" opacity="0.3"/>
  <text x="78" y="155" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">Y</text>
  <text x="724" y="393" font-family="monospace" font-size="11" fill="#64748b">X</text>

  <!-- Frame count annotation -->
  <text x="372" y="248" text-anchor="middle" font-family="monospace" font-size="10" fill="#38bdf8" opacity="0.8">frame ~1300</text>

  <!-- Stats bar -->
  <rect x="100" y="408" width="600" height="28" rx="4" fill="#161b27" opacity="0.6"/>
  <text x="400" y="426" text-anchor="middle" font-family="monospace" font-size="11" fill="#38bdf8" opacity="0.7">AKAZE features · RANSAC outlier rejection · 2,600+ frames · OpenCV</text>
