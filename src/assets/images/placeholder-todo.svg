<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <rect width="800" height="450" fill="#1e2538"/>

  <defs>
    <pattern id="grid4" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#38bdf8" stroke-width="0.15" opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="800" height="450" fill="url(#grid4)"/>

  <text x="400" y="38" text-anchor="middle" font-family="monospace" font-size="13" fill="#38bdf8" opacity="0.7" letter-spacing="2">SECURE TODO REST API</text>

  <!-- Route table header -->
  <rect x="80" y="60" width="640" height="32" rx="6" fill="#0ea5e9" fill-opacity="0.15" stroke="#38bdf8" stroke-width="1"/>
  <text x="148" y="81" text-anchor="middle" font-family="monospace" font-size="11" fill="#38bdf8">METHOD</text>
  <text x="320" y="81" text-anchor="middle" font-family="monospace" font-size="11" fill="#38bdf8">ENDPOINT</text>
  <text x="540" y="81" text-anchor="middle" font-family="monospace" font-size="11" fill="#38bdf8">AUTH</text>
  <text x="680" y="81" text-anchor="middle" font-family="monospace" font-size="11" fill="#38bdf8">DESCRIPTION</text>

  <!-- Divider -->
  <line x1="80" y1="92" x2="720" y2="92" stroke="#38bdf8" stroke-width="0.5" opacity="0.3"/>

  <!-- Routes -->
  <!-- POST /auth/register -->
  <rect x="100" y="100" width="80" height="22" rx="3" fill="#22c55e" fill-opacity="0.2"/>
  <text x="140" y="115" text-anchor="middle" font-family="monospace" font-size="10" fill="#22c55e">POST</text>
  <text x="320" y="115" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">/auth/register</text>
  <text x="540" y="115" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">—</text>
  <text x="672" y="115" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">Register user</text>

  <!-- POST /auth/login -->
  <rect x="100" y="128" width="80" height="22" rx="3" fill="#22c55e" fill-opacity="0.2"/>
  <text x="140" y="143" text-anchor="middle" font-family="monospace" font-size="10" fill="#22c55e">POST</text>
  <text x="320" y="143" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">/auth/login</text>
  <text x="540" y="143" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">—</text>
  <text x="672" y="143" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">Login → JWT</text>

  <!-- GET /todos -->
  <rect x="100" y="156" width="80" height="22" rx="3" fill="#38bdf8" fill-opacity="0.15"/>
  <text x="140" y="171" text-anchor="middle" font-family="monospace" font-size="10" fill="#38bdf8">GET</text>
  <text x="320" y="171" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">/todos</text>
  <text x="540" y="171" text-anchor="middle" font-family="monospace" font-size="10" fill="#38bdf8">JWT</text>
  <text x="672" y="171" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">List todos</text>

  <!-- POST /todos -->
  <rect x="100" y="184" width="80" height="22" rx="3" fill="#22c55e" fill-opacity="0.2"/>
  <text x="140" y="199" text-anchor="middle" font-family="monospace" font-size="10" fill="#22c55e">POST</text>
  <text x="320" y="199" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">/todos</text>
  <text x="540" y="199" text-anchor="middle" font-family="monospace" font-size="10" fill="#38bdf8">JWT</text>
  <text x="672" y="199" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">Create todo</text>

  <!-- PUT /todos/:id -->
  <rect x="100" y="212" width="80" height="22" rx="3" fill="#f59e0b" fill-opacity="0.15"/>
  <text x="140" y="227" text-anchor="middle" font-family="monospace" font-size="10" fill="#f59e0b">PUT</text>
  <text x="320" y="227" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">/todos/:id</text>
  <text x="540" y="227" text-anchor="middle" font-family="monospace" font-size="10" fill="#38bdf8">JWT</text>
  <text x="672" y="227" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">Update todo</text>

  <!-- DELETE /todos/:id -->
  <rect x="100" y="240" width="80" height="22" rx="3" fill="#ef4444" fill-opacity="0.15"/>
  <text x="140" y="255" text-anchor="middle" font-family="monospace" font-size="10" fill="#ef4444">DELETE</text>
  <text x="320" y="255" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">/todos/:id</text>
  <text x="540" y="255" text-anchor="middle" font-family="monospace" font-size="10" fill="#38bdf8">JWT</text>
  <text x="672" y="255" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">Delete todo</text>

  <!-- Tech stack badges row -->
  <rect x="80"  y="300" width="90"  height="26" rx="5" fill="#161b27" stroke="#38bdf8" stroke-width="1" opacity="0.8"/>
  <text x="125" y="317" text-anchor="middle" font-family="monospace" font-size="10" fill="#38bdf8">Node.js</text>

  <rect x="182" y="300" width="90"  height="26" rx="5" fill="#161b27" stroke="#38bdf8" stroke-width="1" opacity="0.8"/>
  <text x="227" y="317" text-anchor="middle" font-family="monospace" font-size="10" fill="#38bdf8">Express</text>

  <rect x="284" y="300" width="90"  height="26" rx="5" fill="#161b27" stroke="#38bdf8" stroke-width="1" opacity="0.8"/>
  <text x="329" y="317" text-anchor="middle" font-family="monospace" font-size="10" fill="#38bdf8">JWT</text>

  <rect x="386" y="300" width="90"  height="26" rx="5" fill="#161b27" stroke="#38bdf8" stroke-width="1" opacity="0.8"/>
  <text x="431" y="317" text-anchor="middle" font-family="monospace" font-size="10" fill="#38bdf8">MongoDB</text>

  <rect x="488" y="300" width="130" height="26" rx="5" fill="#161b27" stroke="#38bdf8" stroke-width="1" opacity="0.8"/>
  <text x="553" y="317" text-anchor="middle" font-family="monospace" font-size="10" fill="#38bdf8">GitHub Actions</text>

  <!-- CI/CD pipeline indicator -->
  <rect x="80" y="355" width="640" height="44" rx="6" fill="#161b27" stroke="#38bdf8" stroke-width="1" opacity="0.4"/>
  <text x="400" y="374" text-anchor="middle" font-family="monospace" font-size="11" fill="#64748b">CI/CD · push → test → lint → deploy</text>
  <text x="400" y="390" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">GitHub Actions pipeline · input validation · bcrypt password hashing</text>
</svg>
